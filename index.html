            { l: "Devotional", i: "📖", t: "Devotional" },
            { l: "Resources", i: "🌐", t: "Resources" },
          ].map(item => (
            <button key={item.t} onClick={() => setTab(item.t)} className={`flex min-w-0 flex-col items-center rounded-2xl px-1.5 py-2 transition ${tab === item.t ? "bg-sky-100 text-sky-900" : "text-slate-400"}`}>
              <span className="text-base">{item.i}</span>
              <span className="mt-0.5 text-[9px] font-semibold">{item.l}</span>
            </button>
          ))}
        </nav>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<RiverOfHopeApp />);
</script>
</body>
</html>

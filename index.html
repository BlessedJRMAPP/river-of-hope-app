const DEVOTIONALS = [
  { title: "You Are Not Too Far Gone", ref: "Isaiah 43:18-19", text: "God says 'Forget the former things; do not dwell on the past. See, I am doing a new thing!' Your past does not disqualify you — it is the very soil God is using to grow something beautiful. Today is a new day.", prayer: "Lord, help me release what was and receive what You are doing now. I trust Your new thing. Amen." },
  { title: "Strength for Today", ref: "Lamentations 3:22-23", text: "His mercies are new every morning. Not every year. Not every month. Every. Single. Morning. Whatever yesterday held, today you receive a fresh supply of grace. Pick it up.", prayer: "Thank You, God, for new mercy today. I receive it. I walk in it. Amen." },
  { title: "When You Feel Like Giving Up", ref: "Galatians 6:9", text: "Let us not grow weary in doing good, for at the proper time we will reap a harvest if we do not give up. The harvest is coming. Your clean days are seeds. Keep planting.", prayer: "God, give me strength to hold on one more day. The harvest is worth it. Amen." },
  { title: "You Are Loved as You Are", ref: "Romans 8:38-39", text: "Nothing — not your past, your failures, your worst day — can separate you from the love of God. Not addiction. Not relapse. Not shame. You are loved. Period.", prayer: "Lord, let Your love reach the places in me I have tried to hide. I receive it today. Amen." },
  { title: "God Sees Your Effort", ref: "Hebrews 6:10", text: "God is not unjust; He will not forget your work and the love you have shown. Every hard day you push through, every meeting you attend, every prayer you whisper — He sees it all.", prayer: "Thank You, Father, that nothing I do in faith goes unnoticed. Keep me going. Amen." },
  { title: "Peace in the Storm", ref: "John 16:33", text: "'I have told you these things so that in Me you may have peace. In this world you will have trouble. But take heart! I have overcome the world.' The storm is real. But so is the One who commands it.", prayer: "Jesus, be my peace today. You have overcome — and so will I. Amen." },
  { title: "Identity Reset", ref: "2 Corinthians 5:17", text: "If anyone is in Christ, the new creation has come. The old has gone — the new is here! You are not your addiction. You are not your worst moment. You are a new creation. Walk in it.", prayer: "God, remind me who I am in You today. I am new. I am Yours. Amen." },
  { title: "He Restores What Was Lost", ref: "Joel 2:25", text: "God says 'I will restore to you the years that the locust has eaten.' The years of addiction, the lost relationships, the wasted time — none of it is beyond God's ability to restore. He is the God of restoration. Your story is not over. The best chapters may still be ahead.", prayer: "Lord, I give You the years I lost. Restore what only You can restore. I trust Your redemption. Amen." },
  { title: "Walking Through the Valley", ref: "Psalm 23:4", text: "Even though I walk through the darkest valley, I will fear no evil, for You are with me. Recovery is a valley walk — not a mountaintop sprint. Some days are dark. Some feel impossible. But the Shepherd does not abandon you in the valley. He walks through it with you.", prayer: "Lord, be my Shepherd today. I may not see the way out but I trust You are with me every step. Amen." },
  { title: "Your Testimony Has Power", ref: "Revelation 12:11", text: "They overcame by the blood of the Lamb and by the word of their testimony. Your story — the hard parts, the shameful parts, the coming-back parts — has power to set someone else free. Do not despise what God has brought you through. It is your weapon and your witness.", prayer: "God, use my story. What I went through was not wasted if it helps even one person hold on. Use me. Amen." },
  { title: "One Day at a Time is Enough", ref: "Matthew 6:34", text: "Do not worry about tomorrow, for tomorrow will worry about itself. Each day has enough trouble of its own. Recovery does not ask you to conquer forever — just today. Just this hour. Just this moment. God's grace is sufficient for exactly where you are right now. Not tomorrow. Now.", prayer: "Father, give me grace for today. Just today. I will trust You with tomorrow when it comes. Amen." },
  { title: "When You Fall, Get Back Up", ref: "Proverbs 24:16", text: "For though the righteous fall seven times, they rise again. A stumble is not the end of your story. Relapse does not disqualify you from recovery. What matters is not that you fell — it is that you got back up. Get back up. God's hand is reaching down right now.", prayer: "Lord, I am getting back up. Help me rise. I refuse to let this fall be my final chapter. Amen." },
  { title: "You Are Worth Fighting For", ref: "Luke 15:4", text: "If a man has a hundred sheep and one goes missing, does he not leave the ninety-nine and go after the lost one? You are the one He left everything to find. You are not too broken, too far gone, or too lost. God thinks you are worth the search. You are worth fighting for.", prayer: "God, thank You for coming after me. Help me believe today that I am worth it — because You say I am. Amen." },
  { title: "Sober and Grateful", ref: "1 Thessalonians 5:18", text: "Give thanks in all circumstances, for this is God's will for you in Christ Jesus. Gratitude is one of the most powerful tools in recovery. When you name what you are thankful for — even small things — you shift your focus from what is missing to what is present. Try it right now: name three things.", prayer: "Lord, thank You for this breath. Thank You for this day. Thank You for not giving up on me. Amen." },
];

const DEVOTIONALS = [
  { title: "You Are Not Too Far Gone", ref: "Isaiah 43:18-19", text: "God says 'Forget the former things; do not dwell on the past. See, I am doing a new thing!' Your past does not disqualify you — it is the very soil God is using to grow something beautiful. Today is a new day.", prayer: "Lord, help me release what was and receive what You are doing now. I trust Your new thing. Amen." },
  { title: "Strength for Today", ref: "Lamentations 3:22-23", text: "His mercies are new every morning. Not every year. Not every month. Every. Single. Morning. Whatever yesterday held, today you receive a fresh supply of grace. Pick it up.", prayer: "Thank You, God, for new mercy today. I receive it. I walk in it. Amen." },
  { title: "When You Feel Like Giving Up", ref: "Galatians 6:9", text: "Let us not grow weary in doing good, for at the proper time we will reap a harvest if we do not give up. The harvest is coming. Your clean days are seeds. Keep planting.", prayer: "God, give me strength to hold on one more day. The harvest is worth it. Amen." },
  { title: "You Are Loved as You Are", ref: "Romans 8:38-39", text: "Nothing — not your past, your failures, your worst day — can separate you from the love of God. Not addiction. Not relapse. Not shame. You are loved. Period.", prayer: "Lord, let Your love reach the places in me I have tried to hide. I receive it today. Amen." },
  { title: "God Sees Your Effort", ref: "Hebrews 6:10", text: "God is not unjust; He will not forget your work and the love you have shown. Every hard day you push through, every meeting you attend, every prayer you whisper — He sees it all.", prayer: "Thank You, Father, that nothing I do in faith goes unnoticed. Keep me going. Amen." },
  { title: "Peace in the Storm", ref: "John 16:33", text: "'I have told you these things so that in Me you may have peace. In this world you will have trouble. But take heart! I have overcome the world.' The storm is real. But so is the One who commands it.", prayer: "Jesus, be my peace today. You have overcome — and so will I. Amen." },
  { title: "Identity Reset", ref: "2 Corinthians 5:17", text: "If anyone is in Christ, the new creation has come. The old has gone — the new is here! You are not your addiction. You are not your worst moment. You are a new creation. Walk in it.", prayer: "God, remind me who I am in You today. I am new. I am Yours. Amen." },
  { title: "He Restores What Was Lost", ref: "Joel 2:25", text: "God says 'I will restore to you the years that the locust has eaten.' The years of addiction, the lost relationships, the wasted time — none of it is beyond God's ability to restore.", prayer: "Lord, I give You the years I lost. Restore what only You can restore. I trust Your redemption. Amen." },
  { title: "Walking Through the Valley", ref: "Psalm 23:4", text: "Even though I walk through the darkest valley, I will fear no evil, for You are with me. Recovery is a valley walk — not a mountaintop sprint. The Shepherd does not abandon you in the valley.", prayer: "Lord, be my Shepherd today. I may not see the way out but I trust You are with me every step. Amen." },
  { title: "Your Testimony Has Power", ref: "Revelation 12:11", text: "They overcame by the blood of the Lamb and by the word of their testimony. Your story — the hard parts, the shameful parts, the coming-back parts — has power to set someone else free.", prayer: "God, use my story. What I went through was not wasted if it helps even one person hold on. Amen." },

              {[

          {/* ── TERMS ── */}
          {tab === "Terms" && (
            <div className="space-y-4">

                <h1 className="mt-1 text-2xl font-bold">Terms of Service</h1>
                <p className="mt-2 text-sm text-white/85">Jordan River Ministries · Effective: March 2026</p>

              ].map((item, i) => (

                  <p className="text-sm leading-7 text-slate-600">{item.text}</p>

            { l: "Chat", i: "💬", t: "Chat" },
